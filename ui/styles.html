<style>
  :root { --muted:#6b7280; }

  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    margin:0;
    background:#f8fafc;
  }

  .container {
    max-width: 1200px;
    margin: 24px auto;
    padding: 0 16px 32px;
  }

  h1 { margin: 0 0 8px; }
  .muted { color: var(--muted); }

  /* Caixa d’informació */
  .info-box {
    background: #eef4ff;
    border-left: 4px solid #1d4ed8;
    padding: 12px 16px;
    border-radius: 8px;
    margin: 12px 0 20px;
    color: #1e3a8a;
    font-size: 14px;
  }

  /* Grid formulari principal */
  .grid {
    display:grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap:12px;
  }

  label {
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:14px;
  }

  input, select, textarea {
    padding:8px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    background:#fff;
    font: inherit;
  }

  /* Botons i accions */
  .actions {
    display:flex;
    gap:8px;
    margin-top:12px;
  }

  button {
    padding:8px 12px;
    border:0;
    border-radius:10px;
    background:#1d4ed8;
    color:#fff;
    cursor:pointer;
    font: inherit;
  }

  button[disabled]{ opacity:.6; cursor:not-allowed; }

  .btn-secondary {
    background:#e2e8f0;
    color:#111827;
  }

  .btn-secondary:hover {
    background:#cbd5e1;
  }

  .btn-primary {
    background:#1d4ed8;
    color:#fff;
  }

  #toast { margin-top:8px; min-height:20px; }
  .hidden { display:none; }

  /* Tabs */
  .tabs {
    display:flex;
    gap:8px;
    margin:16px 0;
  }

  .tab {
    background:#e2e8f0;
    color:#111827;
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
    border:0;
  }

  .tab.active {
    background:#1d4ed8;
    color:#fff;
  }

  .tabpanel {
    display:none;
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:10px;
    padding:16px;
  }

  .tabpanel.active { display:block; }

  /* Taula resultats */
  table {
    width:100%;
    border-collapse:collapse;
    margin-top:12px;
    background:#fff;
    border:1px solid #e5e7eb;
  }

  thead th {
    text-align:left;
    font-weight:600;
    background:#f1f5f9;
  }

  th, td {
    padding:8px;
    border-bottom:1px solid #e5e7eb;
  }

  .clickable-row { cursor:pointer; }
  .clickable-row:hover { background:#f8fafc; }

  .actions-cell { white-space:nowrap; }
  .actions-cell button {
    margin-right:6px;
    padding:6px 10px;
  }

  /* Assistents: textarea + botons laterals */
  .assist-row {
    display:flex;
    gap:8px;
    align-items:flex-start;
  }

  .assist-row textarea {
    flex:1;
    resize:vertical;
  }

  .assist-buttons {
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  /* MODAL selector persones */
  .modal {
    position:fixed;
    inset:0;
    background:rgba(15,23,42,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }

  .modal.open { display:flex; }

  .modal-card {
    background:#fff;
    max-width:900px;
    width:90%;
    border-radius:12px;
    padding:16px 20px;
    box-shadow:0 25px 50px rgba(15,23,42,0.25);
  }

  .modal-head {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
  }

  .modal-body {
    display:flex;
    flex-direction:column;
    gap:12px;
    max-height:70vh;
    overflow:auto;
  }

  .modal-foot {
    display:flex;
    justify-content:flex-end;
    margin-top:12px;
  }

  /* Controls superiors del modal (cercar + check) */
  .modal-controls {
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:4px;
  }

  .modal-controls input:not([type="checkbox"]) {
    flex:1 1 auto;
  }

  .chk {
    display:flex;
    align-items:center;
    gap:4px;
    font-size:13px;
    white-space:nowrap;
  }

  /* Xips de grups */
  .group-chips {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:8px;
  }

    .chip {
    padding:4px 10px;
    border-radius:999px;
    border:0;
    background:#e5e7eb;
    font-size:13px;
    cursor:pointer;
    color:#111827;          /* TEXTO NEGRO SIEMPRE */
  }

  .chip.active {
    background:#dbeafe;     /* blau suau per marcar actiu */
    color:#111827;          /* segueix sent negre */
    font-weight:600;
  }

  /* Llista de persones */
  .people-list {
    border:1px solid #e5e7eb;
    border-radius:8px;
    padding:4px 0;
    min-height:160px;
    max-height:320px;   /* més noms visibles */
    overflow:auto;
    background:#f9fafb;
  }

  .person-row {
    display:flex;
    flex-direction:row;     /* <- IMPORTANT: en fila, no en columna */
    align-items:center;
    gap:8px;
    padding:4px 12px;
    border-radius:6px;
    cursor:pointer;
  }

  .person-row:hover {
    background:#e5e7eb;
  }

  .person-row input[type="checkbox"] {
    margin:0;
  }

  .person-row span {
    flex:1;
    text-align:left;
    font-size:14px;
  }

  @media (max-width: 900px){
    .grid { grid-template-columns: 1fr; }
  }
</style>
